#version=RHEL9
# TEMPLATE ONLY.
# This file is destructive inside the target VM because it wipes and repartitions the disk.
# Replace every placeholder before use.

install
text
reboot

lang en_US.UTF-8
keyboard us
timezone UTC --utc

network --bootproto=dhcp --device=link --activate --hostname=template-rhel

# Replace hashes before use. Do not commit real secrets.
rootpw --iscrypted REPLACE_WITH_ROOT_PASSWORD_HASH
user --name=agent --groups=wheel --iscrypted --password=REPLACE_WITH_USER_PASSWORD_HASH --gecos="Template Agent"

bootloader --location=mbr --boot-drive=sda
clearpart --all --initlabel
autopart --type=lvm

%packages
@^minimal-environment
openssh-server
open-vm-tools
sudo
vim-minimal
%end

%post --log=/root/ks-post.log
set -eux
systemctl enable vmtoolsd || true
systemctl enable sshd || true
printf 'Kickstart template complete
' > /etc/motd
%end
