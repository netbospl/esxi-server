### TEMPLATE ONLY.
### Debian Installer preseed for a disposable VM.
### This file can wipe the target disk; verify the VM target before use.

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian-esxi-template
d-i netcfg/get_domain string example.local

d-i mirror/country string manual
d-i mirror/http/hostname string example.local
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

d-i time/zone string UTC

d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password REPLACE_WITH_ROOT_PASSWORD_HASH
d-i passwd/user-fullname string Template Agent
d-i passwd/username string agent
d-i passwd/user-password-crypted password REPLACE_WITH_USER_PASSWORD_HASH
d-i passwd/user-default-groups string audio cdrom video plugdev sudo

# Destructive guided partitioning for a disposable VM.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

d-i pkgsel/include string openssh-server open-vm-tools sudo
tasksel tasksel/first multiselect standard, ssh-server

d-i finish-install/reboot_in_progress note

d-i preseed/late_command string in-target sh -c 'systemctl enable ssh || true; systemctl enable open-vm-tools || true; printf "Debian preseed template complete\n" > /etc/motd'
